server:
  port: 8082

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orque_opac}
    username: ${SPRING_DATASOURCE_USERNAME:krishnaprasad}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# Custom Application Licensing configurations
licensing:
  secret: ${LICENSE_SECRET_KEY:orque-licensing-secret-key-32ch!}
  ivHex: ${LICENSE_IV_HEX:1234567890abcdef1234567890abcdef}

approval-workflow:
  service-url: ${WORKFLOW_SERVICE_URL:http://localhost:8081}

app:
  mail:
    from: ${MAIL_FROM:noreply@orque.com}
    from-name: ${MAIL_FROM_NAME:Orque Platform}

sso:
  shared-secret: ${SSO_SHARED_SECRET:orque-sso-shared-secret-2024!}

crm:
  base-url: ${CRM_BASE_URL:http://localhost:8080}
