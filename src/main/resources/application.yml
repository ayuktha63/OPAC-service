server:
  port: 8082

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orque_opac}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 25
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# Custom Application Licensing configurations
licensing:
  secret: ${LICENSE_SECRET_KEY}
  ivHex: ${LICENSE_IV_HEX}

approval-workflow:
  service-url: ${WORKFLOW_SERVICE_URL:http://localhost:8081}

app:
  mail:
    from: ${MAIL_FROM:noreply@orque.com}
    from-name: ${MAIL_FROM_NAME:Orque Platform}

sso:
  shared-secret: ${SSO_SHARED_SECRET}

internal:
  service-api-key: ${INTERNAL_SERVICE_API_KEY:${sso.shared-secret:}}

crm:
  base-url: ${CRM_BASE_URL:http://localhost:8085}
  app-url: ${CRM_APP_URL:http://localhost:4300}

opac:
  frontend-url: ${OPAC_FRONTEND_URL:http://localhost:8083}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8083}
